{% extends "base.html" %}

{% block title %}Registro - MindCare{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">Crie sua Conta</h2>
                <form method="POST" action="{{ url_for('main.register') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <!-- Define o perfil como 'paciente' automaticamente para todos os novos registros -->
                    <input type="hidden" name="role" value="paciente">
                    <button type="submit" class="btn btn-primary w-100 transition-colors">Registrar</button>
                </form>
                <div class="text-center mt-3">
                    <p>Já tem uma conta? <a href="{{ url_for('main.login') }}" class="fw-medium">Faça login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
